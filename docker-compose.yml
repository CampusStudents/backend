services:
  backend:
    build: ./
    environment:
      APP__DB__HOST: pg
      APP__RUN__HOST: 0.0.0.0
    ports:
      - "8000:8000"
    depends_on:
      pg:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import sys, urllib.request; r = urllib.request.urlopen('http://localhost:8000/api/health'); sys.exit(0 if r.getcode() == 200 else 1)\"" ]
      interval: 10s
      timeout: 5s
      retries: 10
    env_file:
      - .env
  pg:
    image: postgres:18
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_NAME}" ]
      interval: 5s
      timeout: 3s
      retries: 3
  maildev:
    image: maildev/maildev
    environment:
      - TZ=Europe/Moscow
      - MAILDEV_WEB_PORT=1080
      - MAILDEV_SMTP_PORT=1025
    ports:
      - "8080:1080"
      - "1025:1025"
    logging:
      driver: "json-file"
      options:
        max-size: "1m"

volumes:
  pg_data:
