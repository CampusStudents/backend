x-backend-base: &backend-base
  image: campusback/app:latest
  env_file:
    - .env
  environment:
    APP__DB__HOST: pg
    APP__RUN__HOST: 0.0.0.0

services:
  alembic:
    <<: *backend-base
    depends_on:
      pg:
        condition: service_healthy
    command: [ "alembic", "upgrade", "head" ]

  rbac:
    <<: *backend-base
    depends_on:
      alembic:
        condition: service_completed_successfully
    command: [ "python", "-m", "src.service.rbac.cli" ]

  backend:
    <<: *backend-base
    ports:
      - "8000:8000"
    depends_on:
      rbac:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 10s
      timeout: 5s
      retries: 10
  pg:
    image: postgres:18
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/18/docker
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_NAME}" ]
      interval: 5s
      timeout: 3s
      retries: 3
  maildev:
    image: maildev/maildev
    environment:
      - TZ=Europe/Moscow
      - MAILDEV_WEB_PORT=1080
      - MAILDEV_SMTP_PORT=1025
    ports:
      - "8080:1080"
      - "1025:1025"
    logging:
      driver: "json-file"
      options:
        max-size: "1m"

volumes:
  pg_data:
